<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Traxxis Add-in Suite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="addin.css" rel="stylesheet">
    <script src="addin.js"></script>
</head>
<body>
<div id="traxxisDashboard" style="display:none;">

    <!-- ── Unified Header ── -->
    <header class="suite-header" id="suiteHeader">
        <!-- Fixed: logo + brand -->
        <div class="header-logo-wrap">
            <img src="https://cdn.baseline.is/static/content/logos/mDtvptChQ3XwBLuxuu5hip-lala.svg"
                 alt="Traxxis GPS" class="header-logo">
            <div class="header-divider"></div>
            <span class="header-brand">Add-in Suite</span>
        </div>

        <!-- Dynamic left: breadcrumb / back button injected by JS -->
        <div id="headerLeft"></div>

        <!-- Dynamic right: db badge / addin action buttons injected by JS -->
        <div id="headerRight"></div>
    </header>

    <!-- ── Initial Loading Overlay ── -->
    <div id="suiteLoadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner-ring"></div>
            <div class="mt-3 loading-label">Initializing Suite</div>
        </div>
    </div>

    <!-- ── Add-in View ── -->
    <div id="addinView" style="display:none; flex-direction:column;">
        <div id="addinLoadingOverlay" class="loading-overlay" style="display:none;">
            <div class="loading-content">
                <div class="spinner-ring"></div>
                <div class="mt-3 loading-label">Loading Add-in</div>
            </div>
        </div>
        <div id="addinMountContainer"></div>
    </div>

    <!-- ── Dashboard View ── -->
    <div id="dashboardView" class="dashboard-view">
        <div id="accessDeniedBanner" class="access-denied-banner" style="display:none;">
            <i class="fas fa-triangle-exclamation"></i>
            <span id="accessDeniedMsg"></span>
        </div>
        <div id="addinsGrid" class="addins-grid"></div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
