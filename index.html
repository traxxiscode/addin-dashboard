<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Traxxis Add-in Suite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link href="addin.css" rel="stylesheet">
    <script src="addin.js"></script>
</head>
<body>
<div id="traxxisDashboard" style="display:none;">

    <!-- ── Persistent Header ── -->
    <div class="suite-header" id="suiteHeader">
        <!-- Top bar -->
        <div class="suite-header__topbar">
            <div class="suite-header__left">
                <button class="btn-back-circle" id="backBtn" onclick="traxxisDashboard_back()" style="visibility:hidden;" aria-label="Back to dashboard">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <img src="https://cdn.baseline.is/static/content/logos/mDtvptChQ3XwBLuxuu5hip-lala.svg"
                     alt="Logo" class="header-logo">
            </div>
            <!-- Right slot: injected per-add-in action buttons land here -->
            <div class="suite-header__actions" id="headerActionsSlot"></div>
        </div>
        <!-- Tab strip: hidden on dashboard, shown when an add-in is active -->
        <div class="suite-header__tabs" id="suiteTabStrip" style="display:none;">
            <!-- Tabs rendered by JS -->
        </div>
    </div>

    <!-- Initial Loading Overlay -->
    <div id="suiteLoadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner-ring"></div>
            <div class="mt-4 loading-label">Initializing Suite...</div>
        </div>
    </div>

    <!-- Add-in View -->
    <div id="addinView" style="display:none;">
        <div id="addinLoadingOverlay" class="addin-loading-overlay" style="display:none;">
            <div class="loading-content">
                <div class="spinner-ring"></div>
                <div class="mt-4 loading-label">Loading Add-in...</div>
            </div>
        </div>
        <div id="addinMountContainer"></div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="dashboard-view">
        <div class="container-fluid px-4 py-4">
            <div id="accessDeniedBanner" class="access-denied-banner" style="display:none;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span id="accessDeniedMsg"></span>
            </div>
            <div id="dashboardFilters" class="dashboard-filters"></div>
            <div id="addinsGrid" class="addins-grid"></div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
