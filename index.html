<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Traxxis Add-in Suite</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
    <link href="addin.css" rel="stylesheet">
    <script src="addin.js"></script>
</head>
<body>
<div id="traxxisDashboard" style="display:none;">

    <!-- Header -->
    <div class="custom-header">
        <div class="container-fluid px-4">
            <div class="row align-items-center">
                <div class="col-auto">
                    <img src="https://traxxisgps.com/wp-content/uploads/elementor/thumbs/Traxxis-refresh-logo_horizontal-min-1-qjgvd5cr9kxu5eay6trn10pbylz31ardqnqdluuew0.webp"
                         alt="Traxxis GPS" class="header-logo">
                </div>
                <div class="col">
                    <div class="header-content">
                        <h1 class="header-title">Add-in Suite</h1>
                        <p class="header-subtitle">Select a tool to get started</p>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="db-badge">
                        <i class="fas fa-database me-2"></i>
                        <span id="headerDatabaseName">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Initial Loading Overlay -->
    <div id="initialLoadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="spinner-ring"></div>
            <div class="mt-4 loading-label">Initializing Suite...</div>
        </div>
    </div>

    <!-- Add-in View -->
    <div id="addinView" style="display:none; flex-direction:column;">
        <div class="addin-topbar">
            <button class="btn-back" onclick="traxxisDashboard_back()">
                <i class="fas fa-arrow-left me-2"></i>Back to Suite
            </button>
            <span id="addinViewTitle" class="addin-view-title"></span>
        </div>
        <div id="addinLoadingOverlay" class="addin-loading-overlay" style="display:none;">
            <div class="loading-content">
                <div class="spinner-ring"></div>
                <div class="mt-4 loading-label">Loading Add-in...</div>
            </div>
        </div>
        <!-- Add-in HTML gets injected here -->
        <div id="addinMountContainer"></div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="dashboard-view">
        <div class="container-fluid px-4 py-4">
            <div id="accessDeniedBanner" class="access-denied-banner" style="display:none;">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span id="accessDeniedMsg"></span>
            </div>
            <div id="addinsGrid" class="addins-grid"></div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
